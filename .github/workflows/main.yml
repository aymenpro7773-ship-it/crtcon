name: Ultimate Fix and Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Fix Project Structure
        run: |
          # 1. إنشاء المسار الصحيح للكود
          mkdir -p app/src/main/java/com/example/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # 2. نقل الملفات لأماكنها الجبرية (حتى لو كانت في المكان الخطأ)
          find . -name "MainActivity.kt" -exec mv {} app/src/main/java/com/example/app/MainActivity.kt \;
          find . -name "AndroidManifest.xml" -exec mv {} app/src/main/AndroidManifest.xml \;
          
          # 3. التأكد من أن build.gradle في مكانه الصحيح
          if [ -f "app/build.gradle.kts" ]; then echo "Gradle exists"; else find . -name "build.gradle.kts" -exec cp {} app/build.gradle.kts \; fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Build APK
        run: |
          chmod +x gradlew || gradle wrapper
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Fixed-App-APK
          path: app/build/outputs/apk/debug/app-debug.apk
